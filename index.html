<!DOCTYPE html><!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Equipos</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

h1,h2,h3{
    text-align:center;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

input,
select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btnAdd{
    background:#28a745;
    color:white;
}

.btnGenerate{
    background:#007bff;
    color:white;
}

.btnDelete{
    background:#dc3545;
    color:white;
    margin-top:5px;
}

.player{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.player:last-child{
    border-bottom:none;
}

.playerRow{
    display:flex;
    align-items:center;
    gap:10px;
}

.playerInfo{
    flex:1;
}

.teams{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.team{
    flex:1;
    min-width:350px;
}

.teamHeader{
    color:white;
    text-align:center;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
}

.red{
    background:#c62828;
}

.yellow{
    background:#d4a017;
    color:black;
}

.field{
    position:relative;
    height:700px;
    background:#2f8f2f;
    border:3px solid white;
    border-radius:12px;
    overflow:hidden;
    margin-top:10px;
}

.field:before{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:50%;
    border-top:2px solid white;
}

.field:after{
    content:"";
    position:absolute;
    width:120px;
    height:120px;
    border:2px solid white;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.playerDot{
    position:absolute;
    transform:translate(-50%,-50%);
    background:white;
    border-radius:15px;
    padding:4px 8px;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    box-shadow:0 1px 4px rgba(0,0,0,.4);
}

.stats{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>⚽ Generador de Equipos</h1>

<div class="card">

<h3>Añadir Jugador</h3>

<input
id="nombre"
placeholder="Nombre">

<input
id="nivel"
type="number"
min="1"
max="5"
step="0.1"
placeholder="Nivel">

<label>Posición principal</label>
<select id="pos1">
    <option>Lateral</option>
    <option>Central</option>
    <option>Medio Centro</option>
    <option>Extremo</option>
    <option>Delantero</option>
</select>

<label>Posición secundaria</label>
<select id="pos2">
    <option>Ninguna</option>
    <option>Lateral</option>
    <option>Central</option>
    <option>Medio Centro</option>
    <option>Extremo</option>
    <option>Delantero</option>
</select>

<label>Posición tercera</label>
<select id="pos3">
    <option>Ninguna</option>
    <option>Lateral</option>
    <option>Central</option>
    <option>Medio Centro</option>
    <option>Extremo</option>
    <option>Delantero</option>
</select>

<button
class="btnAdd"
onclick="agregarJugador()">

Añadir Jugador

</button>

</div>

<div class="card">

<h3>Convocados</h3>

<div id="listaJugadores"></div>

<button
class="btnGenerate"
onclick="crearEquipos()">

⚽ Generar Equipos

</button>

</div>

<div id="resultado"></div>
<script>

let jugadores =
JSON.parse(localStorage.getItem("jugadores")) || [];

function guardarJugadores(){
    localStorage.setItem(
        "jugadores",
        JSON.stringify(jugadores)
    );
}

function agregarJugador(){

    const nombre =
    document.getElementById("nombre").value.trim();

    const nivel =
    parseFloat(
        document.getElementById("nivel").value
    );

    const pos1 =
    document.getElementById("pos1").value;

    const pos2 =
    document.getElementById("pos2").value;

    const pos3 =
    document.getElementById("pos3").value;

    if(!nombre || !nivel){
        alert("Introduce nombre y nivel");
        return;
    }

    jugadores.push({
        id: Date.now(),
        nombre,
        nivel,
        pos1,
        pos2,
        pos3,
        presente:true
    });

    guardarJugadores();
    mostrarJugadores();

    document.getElementById("nombre").value="";
    document.getElementById("nivel").value="";
}

function borrarJugador(id){

    jugadores =
    jugadores.filter(j => j.id !== id);

    guardarJugadores();
    mostrarJugadores();
}

function cambiarAsistencia(id){

    const jugador =
    jugadores.find(j => j.id === id);

    jugador.presente =
    !jugador.presente;

    guardarJugadores();
}

function mostrarJugadores(){

    let html="";

    jugadores.forEach(j=>{

        html += `

        <div class="player">

            <div class="playerRow">

                <input
                    type="checkbox"
                    ${j.presente ? "checked" : ""}
                    onchange="cambiarAsistencia(${j.id})">

                <div class="playerInfo">

                    <b>${j.nombre}</b>

                    (${j.nivel})

                    <br>

                    ${j.pos1}
                    /
                    ${j.pos2}

                </div>

            </div>

            <button
            class="btnDelete"
            onclick="borrarJugador(${j.id})">

            Borrar

            </button>

        </div>

        `;
    });

    document.getElementById(
        "listaJugadores"
    ).innerHTML = html;
}

mostrarJugadores();
function crearEquipos(){

    let presentes =
    jugadores.filter(j=>j.presente);

    if(presentes.length < 10){
        alert("Muy pocos jugadores");
        return;
    }

    presentes.sort(
        (a,b)=>b.nivel-a.nivel
    );

    let rojo=[];
    let amarillo=[];

    let puntosRojo=0;
    let puntosAmarillo=0;

    presentes.forEach(j=>{

        if(
            puntosRojo <= puntosAmarillo
        ){
            rojo.push({...j});
            puntosRojo += j.nivel;
        }else{
            amarillo.push({...j});
            puntosAmarillo += j.nivel;
        }

    });

    asignarPortero(rojo);
    asignarPortero(amarillo);

    pintarResultado(
        rojo,
        amarillo,
        puntosRojo,
        puntosAmarillo
    );
}

function asignarPortero(equipo){

    let portero =
    equipo.find(j =>
        j.pos1==="Portero" ||
        j.pos2==="Portero" ||
        j.pos3==="Portero"
    );

    if(portero){
        portero.rolCampo="POR";
        return;
    }

    let aleatorio =
    Math.floor(
        Math.random()*equipo.length
    );

    equipo[aleatorio].rolCampo="POR";
}

function obtenerFormacion(num){

    if(num >= 12){

        return [
            "POR",
            "LAT","CEN","CEN","LAT",
            "MED","MED","MED",
            "EXT","EXT",
            "DEL","DEL"
        ];

    }

    return [
        "POR",
        "LAT","CEN","CEN","LAT",
        "MED","MED","MED",
        "EXT","EXT",
        "DEL"
    ];
}

function coincide(jugador, rol){

    const mapa = {
        "LAT":"Lateral",
        "CEN":"Central",
        "MED":"Medio Centro",
        "EXT":"Extremo",
        "DEL":"Delantero"
    };

    let posicion = mapa[rol];

    return (
        jugador.pos1===posicion ||
        jugador.pos2===posicion ||
        jugador.pos3===posicion
    );
}

function puntuacionPosicion(jugador, rol){

    const mapa = {
        LAT:"Lateral",
        CEN:"Central",
        MED:"Medio Centro",
        EXT:"Extremo",
        DEL:"Delantero"
    };

    const posicion = mapa[rol];

    if(jugador.pos1 === posicion) return 100;
    if(jugador.pos2 === posicion) return 50;
    if(jugador.pos3 === posicion) return 20;

    return -1;
}

function asignarRoles(equipo){

    let disponibles = [...equipo];

    let formacion =
    obtenerFormacion(equipo.length);

    let resultado = [];

    formacion.forEach(rol=>{

        if(rol==="POR"){

            let por =
            disponibles.find(
                j=>j.rolCampo==="POR"
            );

            if(por){

                resultado.push({
                    ...por,
                    rolCampo:"POR",
                    calidadPosicion:"🟢"
                });

                disponibles =
                disponibles.filter(
                    j=>j.id!==por.id
                );
            }

            return;
        }

        let mejorJugador = null;
        let mejorPuntuacion = -1;

        disponibles.forEach(j=>{

            let puntos =
            puntuacionPosicion(j,rol);

            if(
                puntos > mejorPuntuacion
            ){
                mejorPuntuacion = puntos;
                mejorJugador = j;
            }

        });

        if(
            !mejorJugador ||
            mejorPuntuacion < 0
        ){
            return;
        }

        let icono="🟢";

        if(mejorPuntuacion===50){
            icono="🟡";
        }

        if(mejorPuntuacion===20){
            icono="🟠";
        }

        resultado.push({
            ...mejorJugador,
            rolCampo:rol,
            calidadPosicion:icono
        });

        disponibles =
        disponibles.filter(
            j=>j.id!==mejorJugador.id
        );

    });

    disponibles.forEach(j=>{

        resultado.push({
            ...j,
            rolCampo:"BAN",
            calidadPosicion:"❌"
        });

    });

    return resultado;
}
function dibujarCampo(equipo){

    equipo =
    asignarRoles(equipo);

    const posiciones = {

        "POR":[[50,92]],

        "LAT":[
            [18,75],
            [82,75]
        ],

        "CEN":[
            [40,75],
            [60,75]
        ],

        "MED":[
            [30,50],
            [50,45],
            [70,50]
        ],

        "EXT":[
            [18,22],
            [82,22]
        ],

        "DEL":[
            [50,10],
            [38,10]
        ],

        "BAN":[
            [10,96],
            [25,96],
            [40,96]
        ]
    };

    let usados = {
        POR:0,
        LAT:0,
        CEN:0,
        MED:0,
        EXT:0,
        DEL:0,
        BAN:0
    };

    let html =
    '<div class="field">';

    equipo.forEach(j=>{

        let rol =
        j.rolCampo;

        let indice =
        usados[rol] || 0;

        let coords =
        posiciones[rol];

        if(
            indice >= coords.length
        ){
            indice =
            coords.length-1;
        }

        usados[rol]++;

        let p =
        coords[indice];

        html += `
        <div
        class="playerDot"
        style="
        left:${p[0]}%;
        top:${p[1]}%;
        ">
            ${j.nombre} ${j.calidadPosicion || ""}
        </div>
        `;
    });

    html += "</div>";

    return html;
}
function pintarResultado(
    rojo,
    amarillo,
    puntosRojo,
    puntosAmarillo
){

    let diferencia =
    Math.abs(
        puntosRojo-puntosAmarillo
    ).toFixed(1);

    document.getElementById(
        "resultado"
    ).innerHTML = `

    <div class="stats">

        🟥 Equipo Rojo:
        ${puntosRojo.toFixed(1)}

        |

        🟨 Equipo Amarillo:
        ${puntosAmarillo.toFixed(1)}

        <br><br>

        Diferencia:
        ${diferencia}

    </div>

    <div class="teams">

        <div class="team">

            <div class="teamHeader red">
                EQUIPO ROJO
            </div>

            ${dibujarCampo(rojo)}

        </div>

        <div class="team">

            <div class="teamHeader yellow">
                EQUIPO AMARILLO
            </div>

            ${dibujarCampo(amarillo)}

        </div>

    </div>

    `;
}

</script>

</body>
</html>
